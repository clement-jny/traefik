services:
  traefik:
    container_name: traefik
    image: traefik:v3.1
    ports:
      - 80:80 # web entryPoints
      - 443:443 # websecure entryPoints
      - 8080:8080 # Traefik dashboard
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro # Traefik config file
      - /var/run/docker.sock:/var/run/docker.sock:ro # Docker socket
      - traefik-ssl-certs:/ssl-certs # SSL certification
      - ./logs:/var/log/traefik # Traefik & Access logs

volumes:
  traefik-ssl-certs:
    driver: local
