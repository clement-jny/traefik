global:
  checkNewVersion: true
  sendAnonymousUsage: false # Default is true

# (Optional) Log information
# ---
log:
  level: INFO # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: common # common, json, logfmt
  filePath: /var/log/traefik/traefik.log

# (Optional) Accesslog
# ---
accesslog:
  format: common # common, json, logfmt
  filePath: /var/log/traefik/access.log

# (Optional) Enable API & Dashboard
# ---
api:
  dashboard: true # Default is true # Enable dashboard
  insecure: true # Don't do this in production! # Enable Traefik's API and dashboard without security
  debug: true

# Entry points configuration
# ---
entryPoints:
  # HTTP entry
  web:
    address: :80
    # (Optional) Redirect to HTTPS
    # ---
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
          # priority: 42

  # HTTPS entry
  websecure:
    address: :443

# Certificates configuration
# ---
# TODO: Customize your Cert Resolvers and Domain settings
#
certificatesResolvers:
  # LET'S ENCRYPT
  # ---
  # staging:
  #   acme:
  #     email: your-email@example.com # TODO: Change this to your email
  #     storage: /ssl-certs/acme.json
  #     caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
  #     httpChallenge:
  #       entryPoint: web
  production:
    acme:
      email: your-email@example.com # TODO: Change this to your email
      storage: /ssl-certs/acme.json
      caServer: 'https://acme-v02.api.letsencrypt.org/directory'
      httpChallenge:
        entryPoint: web

# Provider configuration
# ---
# TODO: Customize your provider settings if needed
#
providers:
  # DOCKER
  # ---
  #
  docker: # Enable Docker provider
    exposedByDefault: false # Default is true
